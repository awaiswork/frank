services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: frank
      POSTGRES_PASSWORD: frank
      POSTGRES_DB: frank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frank -d frank"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
